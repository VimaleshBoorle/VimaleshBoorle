<svg width="1600" height="600" viewBox="0 0 1600 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI and data science profile introduction</title>
  <desc id="desc">A clean light interface with animated coordinate nodes, a reasoning field, and icons for agents, LLM systems, data science, evaluation, retrieval, infrastructure, and research.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2A63"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="fadeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2563EB" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0B2A63" flood-opacity="0.08"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 3px; }
      .headline { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 62px; font-weight: 650; }
      .subheadline { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 520; }
      .body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; font-weight: 400; }
      .chip { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; }
      .muted { fill: #64748B; }
      .navy { fill: #0F1F3D; }
      .blue { fill: #2563EB; }
      .axis { stroke: #AFC2E5; stroke-width: 1.25; stroke-dasharray: 4 8; }
      .orbit { stroke: #D7E2F3; stroke-width: 1.25; fill: none; }
      .flow { fill: none; stroke: url(#fadeLine); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 9 12; animation: dash 5s linear infinite; }
      .dot { fill: #2563EB; animation: pulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .dot.s2 { animation-delay: .6s; }
      .dot.s3 { animation-delay: 1.2s; }
      .dot.s4 { animation-delay: 1.8s; }
      .scan { opacity: .45; animation: scan 5.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:.25; transform:scale(.85); } 50% { opacity:1; transform:scale(1.25); } }
      @keyframes dash { to { stroke-dashoffset: -84; } }
      @keyframes scan { 0%,100% { transform: translateX(-60px); opacity:.05; } 50% { transform: translateX(70px); opacity:.65; } }
      @media (prefers-reduced-motion: reduce) { .dot,.flow,.scan { animation:none; } }
    </style>
  </defs>

  <rect width="1600" height="600" rx="28" fill="#FCFDFE"/>
  <rect x="1" y="1" width="1598" height="598" rx="27" stroke="#E6ECF5" stroke-width="2"/>

  <!-- subtle background -->
  <g opacity="0.6">
    <path d="M0 486H1600" stroke="#E8EEF7"/>
    <path d="M1115 0V600" stroke="#EEF3F9"/>
    <path d="M0 122H1600" stroke="#F2F5FA"/>
  </g>

  <!-- copy -->
  <text x="88" y="105" class="label blue">APPLIED AI · DATA SCIENCE · OPEN SOURCE</text>
  <text x="88" y="190" class="headline navy">AI/ML Data Scientist</text>
  <text x="88" y="242" class="subheadline navy">LLM Systems · Agentic AI · Evaluation</text>
  <text x="88" y="294" class="body muted">Building reliable AI systems that reason over data, use tools,</text>
  <text x="88" y="326" class="body muted">retrieve evidence, and produce measurable real-world outcomes.</text>

  <g transform="translate(88 365)">
    <rect width="184" height="48" rx="12" fill="#0F1F3D"/>
    <text x="24" y="30" class="chip" fill="#FFFFFF">Explore my work</text>
    <path d="M151 24H165M159 18L165 24L159 30" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(290 365)">
    <rect width="170" height="48" rx="12" fill="#FFFFFF" stroke="#CCD8EA"/>
    <text x="24" y="30" class="chip navy">Open source</text>
    <path d="M137 24H151M145 18L151 24L145 30" stroke="#0F1F3D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- reasoning field / coordinate system -->
  <g transform="translate(1090 252)">
    <circle r="178" class="orbit"/>
    <circle r="126" class="orbit" stroke-dasharray="3 7"/>
    <circle r="76" class="orbit"/>
    <path d="M-235 0H235" class="axis"/>
    <path d="M0-210V210" class="axis"/>
    <text x="230" y="-10" class="chip muted">x</text>
    <text x="12" y="-194" class="chip muted">y</text>

    <g class="scan">
      <path d="M-196 -128C-112 -130 -64 -66 0 0C67 69 119 124 206 130" class="flow"/>
      <path d="M-210 -70C-131 -76 -70 -40 0 0C74 43 137 82 215 70" class="flow" style="animation-delay:.5s"/>
      <path d="M-218 0C-136 -2 -75 -2 0 0C84 2 143 3 220 0" class="flow" style="animation-delay:1s"/>
      <path d="M-210 70C-131 76 -70 40 0 0C74 -43 137 -82 215 -70" class="flow" style="animation-delay:1.5s"/>
      <path d="M-196 128C-112 130 -64 66 0 0C67 -69 119 -124 206 -130" class="flow" style="animation-delay:2s"/>
    </g>

    <circle cx="-170" cy="-112" r="5" class="dot"/>
    <circle cx="-125" cy="-58" r="4" class="dot s2"/>
    <circle cx="-178" cy="38" r="4" class="dot s3"/>
    <circle cx="-102" cy="112" r="5" class="dot s4"/>
    <circle cx="-38" cy="-140" r="4" class="dot s2"/>
    <circle cx="-22" cy="85" r="4" class="dot s3"/>
    <circle cx="0" cy="0" r="7" fill="#0F1F3D"/>
    <circle cx="78" cy="-118" r="4" class="dot s4"/>
    <circle cx="132" cy="-52" r="5" class="dot"/>
    <circle cx="174" cy="32" r="4" class="dot s2"/>
    <circle cx="116" cy="108" r="5" class="dot s3"/>
  </g>

  <!-- focus chips -->
  <g transform="translate(55 505)">
    <g transform="translate(0 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <circle cx="28" cy="28" r="3" fill="#2563EB"/><circle cx="40" cy="28" r="3" fill="#2563EB"/><circle cx="34" cy="39" r="3" fill="#2563EB"/>
      <path d="M28 28L40 28L34 39L28 28Z" stroke="#2563EB" stroke-width="1.4"/>
      <text x="62" y="39" class="chip navy">Agents</text>
    </g>
    <g transform="translate(218 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <path d="M24 27H44M27 33H41M30 39H38" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
      <text x="62" y="39" class="chip navy">LLM Systems</text>
    </g>
    <g transform="translate(436 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <rect x="25" y="35" width="4" height="8" rx="1" fill="#2563EB"/><rect x="32" y="30" width="4" height="13" rx="1" fill="#2563EB"/><rect x="39" y="24" width="4" height="19" rx="1" fill="#2563EB"/>
      <text x="62" y="39" class="chip navy">Data Science</text>
    </g>
    <g transform="translate(654 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <circle cx="34" cy="33" r="10" stroke="#2563EB" stroke-width="2"/><circle cx="34" cy="33" r="4" fill="#2563EB"/><path d="M41 26L47 20" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
      <text x="62" y="39" class="chip navy">Evaluation</text>
    </g>
    <g transform="translate(872 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <circle cx="31" cy="30" r="8" stroke="#2563EB" stroke-width="2"/><path d="M37 36L44 43" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
      <text x="62" y="39" class="chip navy">Retrieval</text>
    </g>
    <g transform="translate(1090 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <path d="M34 22L44 28V39L34 45L24 39V28L34 22Z" stroke="#2563EB" stroke-width="2"/><path d="M24 28L34 34L44 28M34 34V45" stroke="#2563EB" stroke-width="1.5"/>
      <text x="62" y="39" class="chip navy">Infrastructure</text>
    </g>
    <g transform="translate(1308 0)" filter="url(#softShadow)">
      <rect width="204" height="66" rx="16" fill="#FFFFFF" stroke="#E1E8F2"/>
      <circle cx="34" cy="33" r="18" fill="#EFF5FF"/>
      <path d="M34 22V44M23 33H45M27 26L41 40M41 26L27 40" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="34" cy="33" r="4" fill="#2563EB"/>
      <text x="62" y="39" class="chip navy">Research</text>
    </g>
  </g>
</svg>
